name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      contents: read
    steps:
      - name: Start GitHub Deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: '${{ github.token }}'
          environment-url: 'https://ai-course-to-career-navigation.onrender.com'
          environment: production

      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "=========================================================="
            echo "ERROR: RENDER_DEPLOY_HOOK_URL secret is not configured!"
            echo "=========================================================="
            echo "To fix this error, please add the deploy hook from Render:"
            echo "1. Go to your Render web service Dashboard -> Settings."
            echo "2. Copy the Deploy Hook URL under the Deploy Hook section."
            echo "3. Go to GitHub -> Settings -> Secrets and variables -> Actions."
            echo "4. Click 'New repository secret', name it 'RENDER_DEPLOY_HOOK_URL',"
            echo "   and paste the URL as the value."
            echo "=========================================================="
            exit 1
          fi
          curl -s -f -X POST "$DEPLOY_HOOK"
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Update deployment status (Success)
        if: success()
        uses: chrnorm/deployment-action@v2
        with:
          token: '${{ github.token }}'
          environment-url: 'https://ai-course-to-career-navigation.onrender.com'
          environment: production
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update deployment status (Failure)
        if: failure()
        uses: chrnorm/deployment-action@v2
        with:
          token: '${{ github.token }}'
          environment-url: 'https://ai-course-to-career-navigation.onrender.com'
          environment: production
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
