name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      contents: read
    steps:
      - name: Start GitHub Deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: '${{ github.token }}'
          environment-url: 'https://ai-course-to-career-navigation.onrender.com'
          environment: production

      - name: Wait for Render Deployment to be Healthy
        run: |
          node -e "
          const https = require('https');
          const url = 'https://ai-course-to-career-navigation.onrender.com/api/admin/stats';
          let attempts = 0;
          const maxAttempts = 20;
          const interval = 30000; // 30 seconds

          function check() {
            attempts++;
            console.log('Attempt ' + attempts + '/' + maxAttempts + ': Checking service health...');
            
            const req = https.get(url, { timeout: 10000 }, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                try {
                  const json = JSON.parse(data);
                  if (json.systemStatus === 'Healthy') {
                    console.log('Render deployment is Healthy!');
                    process.exit(0);
                  }
                } catch(e) {}
                retry();
              });
            });

            req.on('error', (err) => {
              console.log('Network error:', err.message);
              retry();
            });

            req.on('timeout', () => {
              console.log('Request timed out.');
              req.destroy();
              retry();
            });
          }

          function retry() {
            if (attempts >= maxAttempts) {
              console.error('Timed out waiting for Render deployment to become healthy.');
              process.exit(1);
            }
            setTimeout(check, interval);
          }

          check();
          "

      - name: Update deployment status (Success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: 'https://ai-course-to-career-navigation.onrender.com'
          environment: production
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update deployment status (Failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: 'https://ai-course-to-career-navigation.onrender.com'
          environment: production
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
